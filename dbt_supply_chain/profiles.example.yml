dbt_supply_chain:
  target: dev
  outputs:
    dev:
      type: snowflake
      # Your full Snowflake locator (e.g., xy12345.us-east-2.aws or abc12345)
      account: "zivslxl-gs67275"
      
      # Your Snowflake login username
      user: "amrita"
      
      # Your Snowflake login password
      password: "Dumboo$psbb9744"
      
      # The custom security role we created in the setup script
      role: "SUPPLY_CHAIN_ANALYST_ROLE"
      
      # The target database we generated
